version: '3.9'

services:

  # ─── INFRAESTRUCTURA LOCAL ───────────────────────────────────────

  postgres:
    image: postgis/postgis:15-3.3
    container_name: aidmesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aidmesh
      POSTGRES_USER: aidmesh
      POSTGRES_PASSWORD: aidmesh_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidmesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aidmesh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: aidmesh-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aidmesh
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  emqx:
    image: emqx:5
    container_name: aidmesh-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # MQTT over WebSocket
      - "18083:18083"  # Dashboard EMQX
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── HERRAMIENTAS DE DESARROLLO ──────────────────────────────────

  adminer:
    image: adminer
    container_name: aidmesh-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express
    container_name: aidmesh-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    depends_on:
      - mongo

  # ─── MICROSERVICIOS ──────────────────────────────────────────────

  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    container_name: aidmesh-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev_secret_change_in_prod
      AUTH_SERVICE_URL: http://auth-service:3001
      ALERTS_SERVICE_URL: http://alerts-service:3002
      MAPS_SERVICE_URL: http://maps-service:3003
      COM_SERVICE_URL: http://com-service:3004
    depends_on:
      - auth-service
    volumes:
      - ../../apps/api-gateway:/app
      - /app/node_modules

  auth-service:
    build:
      context: ../../apps/auth-service
      dockerfile: Dockerfile
    container_name: aidmesh-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://aidmesh:aidmesh_dev@postgres:5432/aidmesh
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/auth-service:/app
      - /app/node_modules

  alerts-service:
    build:
      context: ../../apps/alerts-service
      dockerfile: Dockerfile
    container_name: aidmesh-alerts-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://aidmesh:aidmesh_dev@postgres:5432/aidmesh
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../apps/alerts-service:/app
      - /app/node_modules

  maps-service:
    build:
      context: ../../apps/maps-service
      dockerfile: Dockerfile
    container_name: aidmesh-maps-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://aidmesh:aidmesh_dev@postgres:5432/aidmesh
      JWT_SECRET: dev_secret_change_in_prod
    depends_on:
      postgres:
        condition: service_healthy

  com-service:
    build:
      context: ../../apps/com-service
      dockerfile: Dockerfile
    container_name: aidmesh-com-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://aidmesh:aidmesh_dev@postgres:5432/aidmesh
      REDIS_URL: redis://redis:6379
      MQTT_URL: mqtt://emqx:1883
      JWT_SECRET: dev_secret_change_in_prod
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
    volumes:
      - ../../apps/com-service:/app

  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: Dockerfile
    container_name: aidmesh-dashboard
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_MQTT_URL: ws://localhost:8083/mqtt
    depends_on:
      - api-gateway
    volumes:
      - ../../apps/dashboard:/app
      - /app/node_modules
      - /app/.next

# ─── VOLUMES ───────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  emqx_data: